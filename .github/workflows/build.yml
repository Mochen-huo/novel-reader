name: Build Windows exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyInstaller PySide6 requests beautifulsoup4 lxml pywin32
          
      - name: Build exe
        run: |
          pyinstaller --onedir --windowed --name "NovelReader" --add-data "data;data" main.py
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovelReader-Windows
          path: dist/NovelReader/
